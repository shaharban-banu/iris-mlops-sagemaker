name: Deploy to SageMaker

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      IMAGE_TAG: latest
      ENDPOINT_NAME: ${{ secrets.ENDPOINT_NAME }}
      SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Debug Secrets
      run: |
        echo "Checking secrets..."
        if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then echo "ACCESS KEY EMPTY"; else echo "ACCESS KEY OK"; fi
        if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then echo "SECRET KEY EMPTY"; else echo "SECRET KEY OK"; fi
    # 🔐 Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 🧪 Debug (optional but helpful)
    - name: Verify AWS Identity
      run: aws sts get-caller-identity

    # 🐳 Login to ECR
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

    # 🏗️ Build Docker image
    - name: Build Docker image
      run: |
        docker build -t iris-fastapi .

    # 🏷️ Tag image
    - name: Tag Docker image
      run: |
        docker tag iris-fastapi:$IMAGE_TAG \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

    # 📤 Push to ECR
    - name: Push Docker image to ECR
      run: |
        docker push \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

    # 🚀 Deploy to SageMaker
    - name: Deploy to SageMaker Endpoint
      run: |
        pip install boto3

        python <<EOF
        import boto3
        import sagemaker
        from sagemaker.session import Session

        region = "${AWS_REGION}"
        role = "${SAGEMAKER_ROLE_ARN}"
        account = "${AWS_ACCOUNT_ID}"
        repo = "${ECR_REPOSITORY}"
        endpoint_name = "${ENDPOINT_NAME}"

        image_uri = f"{account}.dkr.ecr.{region}.amazonaws.com/{repo}:latest"

        sm_client = boto3.client("sagemaker", region_name=region)

        model_name = endpoint_name + "-model"

        # Create model
        sm_client.create_model(
            ModelName=model_name,
            PrimaryContainer={
                "Image": image_uri,
            },
            ExecutionRoleArn=role,
        )

        # Create endpoint config
        config_name = endpoint_name + "-config"

        sm_client.create_endpoint_config(
            EndpointConfigName=config_name,
            ProductionVariants=[
                {
                    "VariantName": "AllTraffic",
                    "ModelName": model_name,
                    "InstanceType": "ml.t2.medium",
                    "InitialInstanceCount": 1,
                }
            ],
        )

        # Create or update endpoint
        try:
            sm_client.describe_endpoint(EndpointName=endpoint_name)
            sm_client.update_endpoint(
                EndpointName=endpoint_name,
                EndpointConfigName=config_name
            )
            print("Updating existing endpoint...")
        except:
            sm_client.create_endpoint(
                EndpointName=endpoint_name,
                EndpointConfigName=config_name
            )
            print("Creating new endpoint...")

        print("Deployment triggered 🚀")
        EOF